name = "fbcoord"
main = "src/worker.ts"
compatibility_date = "2026-04-04"

[[durable_objects.bindings]]
name = "FBCOORD_POOL"
class_name = "PoolDurableObject"

[[durable_objects.bindings]]
name = "FBCOORD_REGISTRY"
class_name = "RegistryDurableObject"

[[durable_objects.bindings]]
name = "FBCOORD_TOKEN_STORE"
class_name = "TokenDurableObject"

[[durable_objects.bindings]]
name = "FBCOORD_AUTH_GUARD"
class_name = "AuthGuardDurableObject"

[[kv_namespaces]]
binding = "FBCOORD_AUTH_KV"
id = "replace-with-cloudflare-kv-namespace-id"
preview_id = "replace-with-cloudflare-kv-preview-id"

[assets]
directory = "./ui/dist"
binding = "ASSETS"

[[migrations]]
tag = "v1"
new_classes = ["PoolDurableObject"]

[[migrations]]
tag = "v2"
new_classes = ["RegistryDurableObject", "TokenDurableObject"]

[[migrations]]
tag = "v3"
new_classes = ["AuthGuardDurableObject"]
