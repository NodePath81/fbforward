hostname: fbforward-01

forwarding:
  # Where fbforward listens for client connections.
  listeners:
    - bind_addr: 0.0.0.0
      bind_port: 9000
      protocol: tcp
    - bind_addr: 0.0.0.0
      bind_port: 9000
      protocol: udp

  # Flow management.
  limits:
    max_tcp_connections: 50
    max_udp_mappings: 500

  idle_timeout:
    tcp: 60s
    udp: 30s

upstreams:
  # Global upstream list shared by all listeners.
  - tag: primary
    destination:
      host: 203.0.113.10
    measurement:
      # Optional measurement host/port (defaults to destination.host/9876).
      host: 203.0.113.10
      port: 9876
    # Optional tuning.
    priority: 0
  - tag: backup
    destination:
      host: example.net

dns:
  # Optional custom DNS servers (ip or ip:port). Empty = system DNS.
  servers:
    - 1.1.1.1
  # Optional address selection strategy: ipv4_only or prefer_ipv6.
  # If omitted, both A and AAAA results are used.
  # strategy: ipv4_only

measurement:
  # The first adaptive probe runs immediately.

  # fbmeasure is a fixed small-packet echo service on a trusted network.
  probe_timeout: 2s

  # Scheduling.
  schedule:
    interval:
      min: 15s
      max: 45s
    upstream_gap: 5s

  protocols:
    tcp:
      enabled: true
    udp:
      enabled: true

health:
  rtt_ewma_alpha: 0.25
  failure_threshold: 3
  recovery_threshold: 2
  stale_threshold: 60s

control:
  # Control plane bind + auth token.
  bind_addr: 127.0.0.1
  bind_port: 8080
  auth_token: "replace-with-a-long-random-token"
  metrics:
    enabled: true

# Optional generic webhook delivery.
webhook:
  enabled: false
  endpoint: https://events.example/internal/fbforward
  bearer_token: "replace-with-webhook-token"
  source_instance: node-1
  timeout: 5s

geoip:
  enabled: false
  asn_db_path: "/var/lib/fbforward/GeoLite2-ASN.mmdb"
  country_db_path: "/var/lib/fbforward/Country-without-asn.mmdb"

ip_log:
  enabled: false
  log_rejections: true   # Defaults to true when ip_log.enabled is true.
  db_path: "/var/lib/fbforward/iplog.sqlite"
  retention: 720h
  geo_queue_size: 4096
  write_queue_size: 4096
  batch_size: 100
  flush_interval: 5s
  prune_interval: 1h

firewall:
  enabled: false
  default: allow
  rules:
    - action: deny
      cidr: 10.0.0.0/8
    - action: deny
      asn: 4134
    - action: allow
      country: US
