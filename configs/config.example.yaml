hostname: fbforward-01

listeners:
  # Explicit listener -> route mapping.
  - name: web-tcp
    bind: 0.0.0.0:9000
    protocol: tcp
    route: web
  - name: web-udp
    bind: 0.0.0.0:9000
    protocol: udp
    route: web

routes:
  # static routes may list several upstreams for operator overrides; when
  # there is more than one, set default_upstream explicitly. Static routes
  # never fail over automatically.
  - name: web
    strategy: adaptive
    upstreams: [primary, backup]

forwarding:
  # Flow management.

  limits:
    max_tcp_connections: 50
    max_udp_mappings: 500

  idle_timeout:
    tcp: 60s
    udp: 30s

upstreams:
  # Definitions are referenced by routes; listeners do not share them implicitly.
  - tag: primary
    destination:
      host: 203.0.113.10
    measurement:
      # Optional measurement host/port (defaults to destination.host/9876).
      host: 203.0.113.10
      port: 9876
    # Optional tuning.
    priority: 0
  - tag: backup
    destination:
      host: example.net

dns:
  # Optional custom DNS servers (ip or ip:port). Empty = system DNS.
  servers:
    - 1.1.1.1
  # Optional address selection strategy: ipv4_only or prefer_ipv6.
  # If omitted, both A and AAAA results are used.
  # strategy: ipv4_only

measurement:
  # The first adaptive probe runs immediately.

  # fbmeasure is a fixed small-packet echo service on a trusted network.
  probe_timeout: 2s

  # Scheduling.
  schedule:
    interval:
      min: 15s
      max: 45s
    upstream_gap: 5s

  protocols:
    tcp:
      enabled: true
    udp:
      enabled: true

health:
  rtt_ewma_alpha: 0.25
  failure_threshold: 3
  recovery_threshold: 2
  stale_threshold: 60s

control:
  # Control plane bind + auth token.
  bind_addr: 127.0.0.1
  bind_port: 8080
  auth_token: "replace-with-a-long-random-token"
  metrics:
    enabled: true

# Optional generic webhook delivery. The request body is a small JSON event;
# bearer_token is optional and is sent as an Authorization header.
webhook:
  enabled: false
  endpoint: https://events.example/internal/fbforward
  bearer_token: "replace-with-webhook-token"
  source_instance: node-1
  timeout: 5s

geoip:
  enabled: false
  asn_db_path: "/var/lib/fbforward/GeoLite2-ASN.mmdb"
  country_db_path: "/var/lib/fbforward/Country-without-asn.mmdb"

ip_log:
  enabled: false
  # Required for persistent online runtime rules (CreateOnlineRule, etc.).
  log_rejections: true   # Defaults to true when ip_log.enabled is true.
  db_path: "/var/lib/fbforward/iplog.sqlite"
  retention: 720h
  geo_queue_size: 4096
  write_queue_size: 4096
  batch_size: 100
  flush_interval: 5s
  prune_interval: 1h

# Optional remote Flow Context API. It reuses the control HTTP listener.
# Protect remote calls with TLS at a reverse proxy or a trusted private network.
flow_context:
  enabled: false
  max_ttl: 24h
  identities:
    - id: caddy
      token: "replace-with-a-long-random-backend-token"
      routes: [web]
      upstreams: [primary]
      namespaces: [app]

firewall:
  enabled: false
  policy_file: /etc/fbforward/firewall.yaml
  fail_on_initial_load: true
