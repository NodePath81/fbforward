hostname: fbforward-01

listeners:
  # Explicit listener -> route mapping.
  - name: web-tcp
    bind: 0.0.0.0:9000
    protocol: tcp
    route: web
    # Optional per-listener shaping (requires shaping.enabled):
    # shaping:
    #   upload_limit: 50m
    #   download_limit: 200m
  - name: web-udp
    bind: 0.0.0.0:9000
    protocol: udp
    route: web

routes:
  - name: web
    strategy: adaptive
    upstreams: [primary, backup]

forwarding:
  # Flow management.

  limits:
    max_tcp_connections: 50
    max_udp_mappings: 500

  idle_timeout:
    tcp: 60s
    udp: 30s

upstreams:
  # Definitions are referenced by routes; listeners do not share them implicitly.
  - tag: primary
    destination:
      host: 203.0.113.10
    measurement:
      # Optional measurement host/port (defaults to destination.host/9876).
      host: 203.0.113.10
      port: 9876
    # Optional tuning.
    priority: 0
    # Optional per-upstream shaping (requires shaping.enabled).
    # Limits bandwidth to/from this upstream's IP address.
    # shaping:
    #   upload_limit: 100m     # fbforward sends to upstream
    #   download_limit: 500m   # fbforward receives from upstream
  - tag: backup
    destination:
      host: example.net
    # Shaping also works with hostname upstreams (resolved IPs are shaped).
    # shaping:
    #   upload_limit: 50m
    #   download_limit: 200m

dns:
  # Optional custom DNS servers (ip or ip:port). Empty = system DNS.
  servers:
    - 1.1.1.1
  # Optional address selection strategy: ipv4_only or prefer_ipv6.
  # If omitted, both A and AAAA results are used.
  # strategy: ipv4_only

reachability:
  # ICMP reachability probe interval/window.
  probe_interval: 1s
  window_size: 5
  # Delay before starting ICMP probes.
  startup_delay: 5s

measurement:
  # fbmeasure startup and probe scheduling.
  startup_delay: 10s
  fallback_to_icmp_on_stale: true

  # Scheduling.
  schedule:
    interval:
      min: 15s
      max: 45s
    upstream_gap: 5s

  # Fast start + warmup.
  fast_start:
    enabled: true
    timeout: 500ms

  # Optional transport security for fbmeasure.
  security:
    mode: off   # off, tls, mtls
    ca_file: ""
    server_name: ""
    client_cert_file: ""
    client_key_file: ""

  # Protocol-specific test parameters.
  protocols:
    tcp:
      enabled: true
      ping_count: 5
      timeout:
        per_sample: 10s
        per_cycle: 30s
    udp:
      enabled: true
      ping_count: 5
      timeout:
        per_sample: 10s
        per_cycle: 30s

health:
  rtt_ewma_alpha: 0.25
  failure_threshold: 3
  recovery_threshold: 2
  stale_threshold: 60s

switching:
  confirm_duration: 15s
  min_hold_time: 30s
  latency_improvement: 10ms
  close_flows_on_failover: false

control:
  # Control plane bind + auth token.
  bind_addr: 127.0.0.1
  bind_port: 8080
  auth_token: "replace-with-a-long-random-token"
  webui:
    enabled: true
  metrics:
    enabled: true

# Optional notification delivery to fbnotify.
# When enabled, fbforward uses the endpoint, key_id, token, and
# source_instance fields below.
notify:
  enabled: false
  endpoint: http://10.99.0.30:8787/v1/events
  key_id: "replace-with-fbnotify-key-id"
  token: "replace-with-fbnotify-token"
  source_instance: node-1
  # Timing controls for unusable-state alerts.
  startup_grace_period: 5m
  unusable_interval: 30s
  notify_interval: 30m

# Optional coordination mode.
# Generate the fbcoord operator bootstrap token with: openssl rand -hex 32
# Use that value only for the deployed fbcoord Worker secret FBCOORD_TOKEN.
# After fbcoord is deployed, mint one node token per fbforward node from the fbcoord UI/API.
# When enabled, runtime mode can be switched to "coordination" from the Web UI or RPC.
# coordination:
#   endpoint: https://fbcoord.example.workers.dev
#   token: "replace-with-the-per-node-fbcoord-token"
#   heartbeat_interval: 10s

geoip:
  enabled: false
  # Local MMDB files plus refresh URLs from Loyalsoldier/geoip.
  asn_db_url: "https://raw.githubusercontent.com/Loyalsoldier/geoip/release/GeoLite2-ASN.mmdb"
  asn_db_path: "/var/lib/fbforward/GeoLite2-ASN.mmdb"
  country_db_url: "https://raw.githubusercontent.com/Loyalsoldier/geoip/release/Country-without-asn.mmdb"
  country_db_path: "/var/lib/fbforward/Country-without-asn.mmdb"
  refresh_interval: 24h

ip_log:
  enabled: false
  # Required for persistent online runtime rules (CreateOnlineRule, etc.).
  log_rejections: true   # Defaults to true when ip_log.enabled is true.
  db_path: "/var/lib/fbforward/iplog.sqlite"
  retention: 720h
  geo_queue_size: 4096
  write_queue_size: 4096
  batch_size: 100
  flush_interval: 5s
  prune_interval: 1h

# Optional remote Flow Context API. It reuses the control HTTP listener.
# Protect remote calls with TLS at a reverse proxy or a trusted private network.
flow_context:
  enabled: false
  max_ttl: 24h
  identities:
    - id: caddy
      token: "replace-with-a-long-random-backend-token"
      routes: [web]
      upstreams: [primary]
      namespaces: [app]

firewall:
  enabled: false
  policy_file: /etc/fbforward/firewall.yaml
  fail_on_initial_load: true

shaping:
  # Linux tc shaping via netlink (requires CAP_NET_ADMIN).
  enabled: false
  # Network device to shape (required when enabled).
  interface: eth0
  # IFB device used for ingress shaping.
  ifb_device: ifb0
  # Aggregate cap for each direction (bits/sec, SI units).
  aggregate_limit: 1g
