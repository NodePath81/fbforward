name: stability
interval_seconds: 5
convergence_cycles: 3
shaping:
  us-a: {bandwidth: "100mbit", latency: "20ms", loss: "0%"}
  us-b: {bandwidth: "80mbit", latency: "20ms", loss: "0%"}
  us-c: {bandwidth: "60mbit", latency: "20ms", loss: "0%"}
timeline:
  - t: "0s"
    action: wait_convergence
  - t: "600s"
    assertions:
      - type: stability_ok
        reason: "10-minute stability run"
